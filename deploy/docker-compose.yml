services:
  postgres:
    image: postgres:15
    container_name: ai-diary-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_diary}
      POSTGRES_USER: ${POSTGRES_USER:-ai_diary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_diary}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docs/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  redis:
    image: redis:7
    container_name: ai-diary-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: ai-diary-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  python-api:
    build:
      context: ../services/python-api
    container_name: ai-diary-python-api
    env_file:
      - ../.env.example
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    image: node:20
    container_name: ai-diary-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    depends_on:
      - python-api

volumes:
  postgres_data:
  minio_data:
